<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>Sem conexão</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #09090b;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: 100%;
        max-width: 360px;
        padding: 28px;
        border-radius: 28px;
        background: #121212;
        border: 1px solid #27272a;
        text-align: center;
      }
      .badge {
        color: #ceaa6b;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: .25em;
        text-transform: uppercase;
      }
      h1 {
        margin: 12px 0 8px;
        font-size: 24px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Offline</div>
      <h1>Sem conexão</h1>
      <p>Verifique sua internet e tente abrir o sistema novamente.</p>
    </main>
  </body>
</html>
