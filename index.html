<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>BarbeariaClick</title>
    <meta name="description" content="Agendamento online, planos mensais e controle simples para barbearias." />

    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="BarbeariaClick" />

    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="site.webmanifest?v=6" />
    <script>
      (function () {
        var segmento = window.location.pathname.split('/').filter(Boolean)[0] || '';
        var slug = /^[a-z0-9-]+$/.test(segmento) ? segmento.toLowerCase() : '';
        var reservados = {
          admin: true,
          api: true,
          assets: true,
          auth: true,
          barbeiro: true,
          login: true,
          master: true,
        };
        if (!slug || reservados[slug]) return;
        var manifest = document.querySelector('link[rel="manifest"]');
        if (manifest) manifest.setAttribute('href', '/' + encodeURIComponent(slug) + '/site.webmanifest?v=6');
      })();
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BarbeariaClick" />
    <meta property="og:title" content="BarbeariaClick" />
    <meta property="og:description" content="Agendamento online, planos mensais e controle simples para barbearias." />

    <meta property="og:image:secure_url" content="https://barbeariaclick.com.br/og-image.png?v=2" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

  </head>

  </body>
</html>
